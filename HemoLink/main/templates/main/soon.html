<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Vital Pulse | Coming Soon</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-error-container": "#93000a",
              "outline-variant": "#e4beba",
              "on-error": "#ffffff",
              "on-primary-fixed-variant": "#930010",
              "on-tertiary-container": "#e9f7ff",
              "surface-container-highest": "#e0e3e5",
              "on-tertiary": "#ffffff",
              "on-tertiary-fixed-variant": "#354a53",
              "on-primary-fixed": "#410003",
              "surface-tint": "#ba1a20",
              "on-secondary-fixed-variant": "#343d96",
              "on-primary-container": "#fff2f0",
              "surface-container-lowest": "#ffffff",
              "outline": "#8f6f6c",
              "tertiary": "#455b65",
              "secondary": "#4c56af",
              "on-surface-variant": "#5b403d",
              "surface-container-high": "#e6e8ea",
              "on-surface": "#191c1e",
              "surface-bright": "#f8f9fb",
              "tertiary-fixed-dim": "#b4cad6",
              "primary-fixed-dim": "#ffb3ac",
              "error": "#ba1a1a",
              "on-tertiary-fixed": "#071e27",
              "inverse-primary": "#ffb3ac",
              "secondary-fixed": "#e0e0ff",
              "secondary-fixed-dim": "#bdc2ff",
              "primary-fixed": "#ffdad6",
              "tertiary-fixed": "#cfe6f2",
              "on-secondary-fixed": "#000767",
              "on-secondary": "#ffffff",
              "error-container": "#ffdad6",
              "surface-container-low": "#f2f4f6",
              "surface": "#f8f9fb",
              "on-secondary-container": "#27308a",
              "on-primary": "#ffffff",
              "background": "#f8f9fb",
              "primary": "#af101a",
              "inverse-on-surface": "#eff1f3",
              "surface-variant": "#e0e3e5",
              "surface-dim": "#d8dadc",
              "tertiary-container": "#5e737d",
              "primary-container": "#d32f2f",
              "secondary-container": "#959efd",
              "on-background": "#191c1e",
              "inverse-surface": "#2d3133",
              "surface-container": "#eceef0"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        @keyframes pulse-flow {
            0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            33% { transform: translate(10%, -5%) scale(1.1); opacity: 0.5; }
            66% { transform: translate(-5%, 10%) scale(0.9); opacity: 0.4; }
            100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
        }

        .vital-pulse-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            z-index: -1;
            background-color: #f8f9fb;
        }

        .pulse-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            background: radial-gradient(circle, #af101a 0%, transparent 70%);
            animation: pulse-flow 12s infinite ease-in-out;
        }

        .pulse-blob-1 { width: 600px; height: 600px; top: -100px; left: -100px; animation-delay: 0s; }
        .pulse-blob-2 { width: 500px; height: 500px; bottom: -50px; right: -50px; animation-delay: -4s; background: radial-gradient(circle, #4c56af 0%, transparent 70%); opacity: 0.2; }
        .pulse-blob-3 { width: 400px; height: 400px; top: 30%; right: 20%; animation-delay: -8s; opacity: 0.15; }
    </style>
</head>
<body class="bg-background text-on-surface font-body overflow-hidden">
<div class="vital-pulse-bg">
<div class="pulse-blob pulse-blob-1"></div>
<div class="pulse-blob pulse-blob-2"></div>
<div class="pulse-blob pulse-blob-3"></div>
</div>
<main class="relative h-screen flex flex-col items-center justify-between py-12 px-6">
<div class="flex flex-col items-center justify-center pt-8">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">emergency</span>
<h1 class="text-2xl font-bold tracking-tight text-primary font-headline">HemoLink</h1>
</div>
</div>
<div class="flex flex-col items-center justify-center text-center max-w-4xl">
<h2 class="font-headline font-extrabold text-7xl md:text-9xl tracking-tighter text-on-surface mb-4 drop-shadow-sm">
                Coming Soon
            </h2>
<p class="font-body text-on-surface-variant text-lg md:text-xl max-w-lg leading-relaxed">
                We are building a life-saving medical network. The pulse of the community is about to get stronger.
            </p>
<div class="mt-12 flex flex-col items-center gap-4">
</div>
<span class="font-label text-sm uppercase tracking-widest text-on-surface-variant font-medium">System Deployment in Progress</span>
</div>
</div>
<div class="flex flex-col items-center gap-2 pb-8">
<p class="text-on-surface-variant font-label text-sm opacity-60">
                © 2026 HemoLink Medical Network. All rights reserved.
            </p>
</div>
</main>
</body></html>
